<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genogram Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e2f; color: #fff; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        pre { background: #2d2d3a; padding: 15px; border-radius: 8px; overflow-x: auto; margin-top: 10px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .card { background: #2d2d3a; padding: 20px; margin: 20px 0; border-radius: 12px; }
    </style>
</head>
<body>
    <h1>🧬 Genogram System v1.1 - Тест API</h1>
    <div class="card">
        <h3>📡 Тест API</h3>
        <button onclick="testHealth()">Health Check</button>
        <button onclick="testCBT()">CBT Analysis</button>
        <button onclick="testSymptoms()">Symptoms</button>
        <pre id="result">Нажмите кнопку для теста...</pre>
    </div>
    <script>
        const API_URL = 'http://localhost:8082/api/v1';
        
        async function testHealth() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Запрос...';
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                resultDiv.innerHTML = `<span class="success">✅ Успешно!</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Ошибка: ${error.message}</span>`;
            }
        }
        
        async function testCBT() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Анализ мысли...';
            try {
                const response = await fetch(`${API_URL}/cbt/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thought: 'Я всегда все порчу, я никчемный' })
                });
                const data = await response.json();
                resultDiv.innerHTML = `<span class="success">✅ Успешно!</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Ошибка: ${error.message}</span>`;
            }
        }
        
        async function testSymptoms() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Загрузка симптомов...';
            try {
                const response = await fetch(`${API_URL}/symptoms`);
                const data = await response.json();
                resultDiv.innerHTML = `<span class="success">✅ Успешно!</span>\n${JSON.stringify(data.slice(0, 3), null, 2)}...`;
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Ошибка: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
